l_english:
  vilnius.0001.t: "Dream Of A Wolf"
  vilnius.0001.desc: "After our hunt, while resting in a forest, I saw a wolf in my dreams. This wolf was howling with an unbearably strong sound. The wolf had no fur, as it was made out of iron - as if it was some statue or beast of legend. The creature was standing on a tall hill, and it was shining. After waking up, I felt uneasy - what could this dream mean?"
  vilnius.0001.kingly_comment: "Should a kingly figure like me even bother with such dreams?"
  vilnius.0001.a: "I should consult my head priest about this."
  vilnius.0001.b: "Nonsense! Such nightmares do not fit a mighty ruler."

  vilnius.0002.t: "Dream Of A... City?"
  vilnius.0002.desc: "My priest, [lizdeika.GetName], tells me that the wolf symbolizes a city. The wolf is a sign of power, and it was standing upon a hill - therefore, surely, this means that a powerful city must be built upon a hill. He also proclaims that, apparently, the horrifyingly loud sound of the wolf's howl is a good thing - this means the city will be so famous the entirety of Europe will talk about it! Additionaly, from the details of the dream, he has deciphered the location in which the city must be built - and apparently, it is [vilnius_location_for_event.GetNameNoTier]. We must begin building it right away!"
  vilnius.0002.a: "If this is the will of Perkūnas..."
  vilnius.0002.tt: "A decision to build Vilnius will appear in the Decisions tab."