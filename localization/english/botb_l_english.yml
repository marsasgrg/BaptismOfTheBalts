l_english:
  vilnius.0001.t: "Dream Of A Wolf"
  vilnius.0001.desc: "After our hunt, I saw a wolf in my dreams. This wolf was howling, and he was made of iron, standing atop a mighty hill. I have no idea what this meant."
  vilnius.0001.kingly_comment: "Should a kingly figure like me even bother with such dreams?"
  vilnius.0001.a: "I should consult my head priest about this."
  vilnius.0001.b: "Nonsense! Such dreams do not fit a mighty ruler."